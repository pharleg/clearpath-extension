<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClearPath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f9cf9;
      --accent-glow: rgba(79, 156, 249, 0.15);
      --text: #e8eaf0;
      --text-muted: #6b7099;
      --green: #4ade80;
      --red: #f87171;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      width: 320px;
      padding: 0;
      overflow: hidden;
    }

    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #4f9cf9, #7c5cbf);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .logo-name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .logo-tagline {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    /* Master toggle */
    .master-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .toggle-label {
      flex: 1;
      font-size: 13px;
      font-weight: 500;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      margin-right: 4px;
      display: inline-block;
      transition: all 0.2s;
    }

    .status-dot.off {
      background: var(--text-muted);
      box-shadow: none;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--surface2);
      border-radius: 11px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }

    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(18px);
    }

    /* Mode selector */
    .section {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 10px;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .mode-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 7px;
      padding: 8px 4px;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .mode-btn .mode-icon {
      font-size: 16px;
    }

    .mode-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .mode-btn.active {
      background: var(--accent-glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Category toggles */
    .categories {
      padding: 14px 20px;
    }

    .category-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .category-row:last-child {
      border-bottom: none;
    }

    .category-name {
      font-size: 13px;
      font-weight: 500;
    }

    .category-count {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-top: 1px;
    }

    /* Footer */
    .footer {
      padding: 10px 20px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
    }

    .footer-note {
      font-size: 10px;
      color: var(--text-muted);
    }

    .apply-btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .apply-btn:hover {
      opacity: 0.85;
    }

    .apply-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-icon">🛤</div>
      <div>
        <div class="logo-name">ClearPath</div>
        <div class="logo-tagline">Content Filter</div>
      </div>
    </div>
  </div>

  <div class="master-toggle">
    <span class="toggle-label">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Filtering active</span>
    </span>
    <label class="toggle">
      <input type="checkbox" id="masterToggle" checked>
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>

  <div class="section">
    <div class="section-label">Filtered content appears as</div>
    <div class="mode-grid">
      <button class="mode-btn active" data-mode="blur">
        <span class="mode-icon">👁</span>
        Blurred
      </button>
      <button class="mode-btn" data-mode="hide">
        <span class="mode-icon">🚫</span>
        Hidden
      </button>
      <button class="mode-btn" data-mode="replace">
        <span class="mode-icon">📝</span>
        Replaced
      </button>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Filter categories</div>
    <div id="categoryList"></div>
  </div>

  <div class="footer">
    <span class="footer-note">No data leaves your browser.</span>
    <button class="apply-btn" id="applyBtn">Apply</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
